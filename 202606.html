  <title>202606 FA</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Microsoft JhengHei", sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #333;
    }
    h1, h2, h3 {
      text-align: center;
      color: #2c3e50;
      margin: 50px 0 30px;
    }
    .section {
      margin-bottom: 60px;
    }
    .question {
      margin: 25px 0;
      padding: 20px;
      background: #f9fbfc;
      border-radius: 10px;
      border-left: 5px solid #3498db;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .question p {
      margin: 0 0 12px 0;
      font-size: 1.1rem;
    }
    strong {
      color: #e74c3c;
    }
    select {
      padding: 10px 14px;
      font-size: 1.05rem;
      min-width: 320px;
      border-radius: 6px;
      border: 1px solid #bdc3c7;
      background: white;
    }
    select:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.2);
    }
    button {
      display: block;
      margin: 60px auto;
      padding: 18px 80px;
      font-size: 1.35rem;
      font-weight: bold;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #219653;
    }
    .result {
      display: none;
      margin: 40px 0;
      padding: 30px;
      background: #f4f6f9;
      border-radius: 12px;
      border: 1px solid #dfe6ed;
    }
    .total-score {
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      margin: 30px 0 20px;
      padding: 20px;
      background: #d4edda;
      border-radius: 10px;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .item {
      margin: 18px 0;
      padding: 16px;
      background: white;
      border-radius: 8px;
      border: 1px solid #eee;
    }
    .correct { color: #27ae60; font-weight: bold; }
    .wrong   { color: #c0392b; font-weight: bold; }
    .answer-show {
      margin-top: 8px;
      font-size: 0.98rem;
      color: #555;
    }
    #submitMessage {
      text-align: center;
      margin-top: 25px;
      font-size: 1.15rem;
    }
    .success { color: #27ae60; }
    .error   { color: #c0392b; }
    .subtitle {
      text-align: center;
      color: #555;
      margin-bottom: 30px;
    }
  </style>
</head>
